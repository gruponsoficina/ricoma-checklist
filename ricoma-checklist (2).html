    textarea { resize: vertical; }

<body>
<div id="app"><p style="color:var(--text2);padding:2rem;text-align:center;">Conectando ao banco de dados...</p></div>

<script>
// ── DADOS ────────────────────────────────────────────────
const MECHANICS = ["Vitor","Luiz","Iodenir"];
const CHECKLISTS = {
  envio: { label: "Preparação para Envio", items: [
    { id:"placas",    label:"Conexões e cabos das placas",     detail:"Verificar todas as conexões e cabos das placas eletrônicas" },
    { id:"parafusos", label:"Aperto dos parafusos",            detail:"Verificar aperto de todos os parafusos da máquina" },
    { id:"faca",      label:"Posição da faca",                 detail:"Verificar se a posição da faca está correta conforme especificação" },
    { id:"estrutura", label:"Danos na estrutura",              detail:"Verificar danos, marcas de transporte e locais com tinta solta" },
    { id:"agulha",    label:"Altura da barra de agulha",       detail:"Verificar e ajustar a altura da barra de agulha conforme spec RICOMA" },
    { id:"lancadeira",label:"Tempo da lançadeira",             detail:"Verificar e ajustar o tempo da lançadeira" },
    { id:"lubrificacao",label:"Lubrificação do excêntrico",   detail:"Lubrificar o excêntrico com graxa de rolamento" },
    { id:"tensao",    label:"Tensão das linhas superiores",    detail:"Regular a tensão de todas as linhas superiores (padrão: 130~150g)" },
    { id:"acessorios",label:"Caixa de acessórios e pendrive", detail:"Conferir conteúdo da caixa de acessórios e do pendrive da máquina" },
    { id:"pendrive",  label:"Manual e partbook no pendrive",   detail:"Adicionar manual em português e partbook da máquina no pendrive" },
    { id:"senha",     label:"Adicional de senha",              detail:"Verificar e registrar o adicional de senha da máquina" },
  ]},
  conserto: { label: "Recebimento para Conserto", items: [
    { id:"defeito",      label:"Defeito relatado pelo cliente",     detail:"Registrar com detalhes o defeito informado pelo cliente" },
    { id:"visual",       label:"Verificação visual externa",        detail:"Verificar danos externos visíveis antes de qualquer intervenção" },
    { id:"teste_inicial",label:"Teste de funcionamento inicial",    detail:"Ligar a máquina e observar o comportamento inicial" },
    { id:"mecanico",     label:"Diagnóstico mecânico",              detail:"Verificar partes mecânicas relacionadas ao defeito relatado" },
    { id:"eletronico",   label:"Diagnóstico eletrônico",            detail:"Verificar placas e componentes eletrônicos" },
    { id:"fotos_danos",  label:"Fotos dos danos encontrados",       detail:"Fotografar todos os danos e peças com defeito identificados" },
    { id:"orcamento",    label:"Orçamento aprovado pelo cliente",   detail:"Confirmar aprovação do orçamento antes de iniciar o reparo" },
  ]}
};

// ── ESTADO ───────────────────────────────────────────────
let S = {
  screen:"home", records:[], selected:null,
  form:nf(), step:0, expanded:{},
  loading:true, saving:false, filter:"todos", db:null
};

function nf() {
  return { mechanic:"", type:"envio", model:"", serial:"",
           items:{}, notes:{}, photos:{}, observation:"",
           compNote:"", compPhotos:[] };
}

// ── FIREBASE ─────────────────────────────────────────────
function initFirebase() {
  try {
    firebase.initializeApp(FIREBASE_CONFIG);
    S.db = firebase.firestore();
    loadRecords();
  } catch(e) {
    document.getElementById("app").innerHTML =
      `<div style="padding:2rem;color:var(--danger);">
        <p style="font-weight:500;margin-bottom:8px;">⚠️ Erro de configuração Firebase</p>
        <p style="font-size:13px;color:var(--text2);">Verifique se você substituiu os dados do Firebase Config no arquivo HTML.</p>
       </div>`;
  }
}

async function loadRecords() {
  S.loading = true; render();
  try {
    const snap = await S.db.collection("checklists").orderBy("date","desc").get();
    S.records = snap.docs.map(d => ({ id: d.id, ...d.data() }));
  } catch(e) { S.records = []; }
  S.loading = false; render();
}

async function saveRecord(rec) {
  S.saving = true; render();
  try {
    await S.db.collection("checklists").doc(rec.id).set(rec);
    await loadRecords();
    S.screen="records"; S.form=nf(); S.step=0; S.saving=false; render();
  } catch(e) {
    S.saving=false;
    alert("Erro ao salvar. Verifique sua conexão e tente novamente.");
    render();
  }
}

function submitForm() {
  const f = S.form;
  if (!f.mechanic || !f.model) { alert("Selecione o mecânico e informe o modelo."); return; }
  const unc = CHECKLISTS[f.type].items.filter(i => !f.items[i.id]);
  if (unc.length > 0 && !confirm(`${unc.length} item(s) não verificado(s). Salvar assim mesmo?`)) return;
  saveRecord({ ...f, id:"r"+Date.now(), date: new Date().toISOString() });
}

// ── HELPERS ──────────────────────────────────────────────
function persist() {
  const o=document.getElementById("obs"); if(o) S.form.observation=o.value;
  const c=document.getElementById("comp-note"); if(c) S.form.compNote=c.value;
  document.querySelectorAll(".ni").forEach(n => { S.form.notes[n.dataset.id]=n.value; });
}

function readFile(file, cb) {
  if (!file) return;
  const reader = new FileReader();
  reader.onload = e => {
    const img = new Image();
    img.onload = () => {
      const canvas = document.createElement('canvas');
      const maxW = 1024, maxH = 1024;
      let w = img.width, h = img.height;
      if (w > maxW) { h = Math.round(h * maxW / w); w = maxW; }
      if (h > maxH) { w = Math.round(w * maxH / h); h = maxH; }
      canvas.width = w; canvas.height = h;
      canvas.getContext('2d').drawImage(img, 0, 0, w, h);
      cb(canvas.toDataURL('image/jpeg', 0.65));
    };
    img.src = e.target.result;
  };
  reader.readAsDataURL(file);
}

function fmtDate(iso) {
  const d = new Date(iso);
  return d.toLocaleDateString("pt-BR") + " " + d.toLocaleTimeString("pt-BR",{hour:"2-digit",minute:"2-digit"});
}

function sc(st) { return st==="ok"?"var(--success)":st==="problema"?"var(--danger)":st==="na"?"var(--text2)":"var(--text3)"; }
function sb(st) { return st==="ok"?"var(--success-bg)":st==="problema"?"var(--danger-bg)":st==="na"?"var(--bg2)":"var(--bg)"; }
function si(st) { return st==="ok"?"✓":st==="problema"?"✕":st==="na"?"—":"○"; }
function sl(st) { return st==="ok"?"OK":st==="problema"?"Problema":st==="na"?"N/A":"—"; }

// ── RENDER ───────────────────────────────────────────────
function render() {
  const app = document.getElementById("app");
  app.innerHTML = "";
  if (S.screen==="home")    rHome(app);
  else if (S.screen==="new") { if(S.step===0) rStep0(app); else if(S.step===1) rStep1(app); else rStep2(app); }
  else if (S.screen==="records") rRecords(app);
  else if (S.screen==="detail")  rDetail(app);
  bind();
}

function hdr(app, title, back) {
  const w = document.createElement("div");
  w.innerHTML = `<div style="display:flex;align-items:center;gap:10px;margin-bottom:1.25rem;">
    <button class="back-btn" data-t="${back}" style="padding:7px 9px;background:var(--bg2);border-radius:var(--radius);display:flex;align-items:center;font-size:18px;">←</button>
    <h2 style="font-size:18px;font-weight:600;">${title}</h2>
  </div>`;
  app.appendChild(w); return w;
}

function rHome(app) {
  const recs=S.records, today=new Date().toDateString();
  const tc=recs.filter(r=>new Date(r.date).toDateString()===today).length;
  const m=new Date(), mc=recs.filter(r=>{const d=new Date(r.date);return d.getMonth()===m.getMonth()&&d.getFullYear()===m.getFullYear();}).length;
  app.innerHTML=`
<div style="margin-bottom:1.5rem;">
  <p style="font-size:11px;text-transform:uppercase;letter-spacing:0.08em;color:var(--text3);margin-bottom:4px;">RICOMA · Assistência Técnica</p>
  <h1 style="font-size:24px;font-weight:700;">Checklists</h1>
</div>
<div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:1.5rem;">
  <div class="surface"><p style="font-size:12px;color:var(--text2);">Hoje</p><p style="font-size:24px;font-weight:700;margin-top:4px;">${S.loading?"…":tc}</p></div>
  <div class="surface"><p style="font-size:12px;color:var(--text2);">Este mês</p><p style="font-size:24px;font-weight:700;margin-top:4px;">${S.loading?"…":mc}</p></div>
</div>
<div style="display:flex;flex-direction:column;gap:10px;">
  <button class="nav-btn" data-s="new" style="padding:16px;border-radius:var(--radius-lg);text-align:left;width:100%;display:flex;align-items:center;gap:12px;">
    <div style="width:42px;height:42px;border-radius:10px;background:var(--info-bg);display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:22px;">＋</div>
    <div><p style="font-weight:600;font-size:15px;">Novo checklist</p><p style="font-size:13px;color:var(--text2);margin-top:2px;">Iniciar verificação de máquina</p></div>
  </button>
  <button class="nav-btn" data-s="records" style="padding:16px;border-radius:var(--radius-lg);text-align:left;width:100%;display:flex;align-items:center;gap:12px;">
    <div style="width:42px;height:42px;border-radius:10px;background:var(--bg2);display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:22px;">☰</div>
    <div><p style="font-weight:600;font-size:15px;">Ver registros</p><p style="font-size:13px;color:var(--text2);margin-top:2px;">${S.loading?"Carregando...":recs.length+" registro"+(recs.length!==1?"s":"")+" no total"}</p></div>
  </button>
</div>
${recs.length>0?`<div style="margin-top:2rem;"><p style="font-size:11px;color:var(--text3);text-transform:uppercase;letter-spacing:0.06em;margin-bottom:10px;">Recentes</p>${recs.slice(0,3).map(r=>`<div class="card" style="margin-bottom:6px;display:flex;justify-content:space-between;align-items:flex-start;"><div><p style="font-weight:600;font-size:14px;">${r.model}</p><p style="font-size:12px;color:var(--text2);margin-top:2px;">${r.mechanic} · ${CHECKLISTS[r.type]?.label}</p></div><p style="font-size:11px;color:var(--text3);">${new Date(r.date).toLocaleDateString("pt-BR")}</p></div>`).join("")}</div>`:""}`;
}

function rStep0(app) {
  const w=hdr(app,"Novo checklist","home"), f=S.form;
  w.insertAdjacentHTML("beforeend",`
<div style="display:flex;flex-direction:column;gap:14px;">
  <div>
    <span class="lbl">Tipo de checklist</span>
    <div style="display:flex;flex-direction:column;gap:6px;">
      ${Object.entries(CHECKLISTS).map(([k,v])=>`<button class="type-btn" data-type="${k}" style="padding:12px 14px;border-radius:var(--radius);text-align:left;width:100%;font-size:14px;font-weight:${f.type===k?"600":"400"};border:${f.type===k?"2px solid var(--info)":"0.5px solid var(--border)"};background:${f.type===k?"var(--info-bg)":"var(--bg)"};color:${f.type===k?"var(--info)":"var(--text)"};">${v.label}</button>`).join("")}
    </div>
  </div>
  <div>
    <span class="lbl">Mecânico responsável</span>
    <div style="display:flex;gap:6px;">
      ${MECHANICS.map(m=>`<button class="mec-btn" data-mec="${m}" style="flex:1;padding:10px 4px;border-radius:var(--radius);font-size:13px;font-weight:${f.mechanic===m?"600":"400"};border:${f.mechanic===m?"2px solid var(--info)":"0.5px solid var(--border)"};background:${f.mechanic===m?"var(--info-bg)":"var(--bg)"};color:${f.mechanic===m?"var(--info)":"var(--text)"};">${m}</button>`).join("")}
    </div>
  </div>
  <div><span class="lbl">Modelo da máquina</span><input id="inp-model" placeholder="Ex: RICOMA EM-1010" value="${f.model}" /></div>
  <div><span class="lbl">Número de série (opcional)</span><input id="inp-serial" placeholder="Ex: SN-202401-001" value="${f.serial}" /></div>
  <button id="btn-start" style="padding:14px;border-radius:var(--radius);background:var(--info-bg);border:none;color:var(--info);font-weight:600;font-size:15px;margin-top:4px;">Iniciar checklist →</button>
</div>`);
}

function rStep1(app) {
  const w=hdr(app,CHECKLISTS[S.form.type].label,"step0"), f=S.form;
  const items=CHECKLISTS[f.type].items, cc=items.filter(i=>f.items[i.id]).length, prog=Math.round(cc/items.length*100);
  const cp=f.compPhotos||[];
  let html=`
<div style="margin-bottom:1rem;">
  <div style="display:flex;justify-content:space-between;margin-bottom:6px;">
    <span style="font-size:13px;color:var(--text2);">${cc}/${items.length} verificados</span>
    <span style="font-size:13px;font-weight:600;">${prog}%</span>
  </div>
  <div style="height:4px;background:var(--bg2);border-radius:2px;"><div style="height:4px;width:${prog}%;background:var(--success);border-radius:2px;"></div></div>
</div>
<div style="display:flex;flex-direction:column;gap:8px;">`;

  items.forEach((item,idx)=>{
    const st=f.items[item.id], note=f.notes[item.id]||"", photo=f.photos[item.id], exp=!!S.expanded[item.id];
    html+=`
<div style="border:0.5px solid ${st==="problema"?"var(--danger)":"var(--border)"};border-radius:var(--radius);overflow:hidden;">
  <div class="item-hdr" data-id="${item.id}" style="padding:12px 14px;cursor:pointer;display:flex;align-items:center;gap:10px;background:${sb(st)};">
    <span style="font-size:11px;color:${sc(st)};min-width:18px;font-weight:600;">${idx+1}</span>
    <span style="flex:1;font-size:14px;font-weight:500;color:${st?"":""};color:${sc(st)||"var(--text)"};">${item.label}</span>
    <span style="font-size:18px;color:${sc(st)};font-weight:600;">${si(st)}</span>
  </div>
  ${exp?`<div style="padding:12px 14px;border-top:0.5px solid var(--border);">
    <p style="font-size:13px;color:var(--text2);margin-bottom:10px;">${item.detail}</p>
    <div style="display:flex;gap:6px;margin-bottom:10px;">
      <button class="st-btn" data-id="${item.id}" data-val="ok" style="flex:1;padding:8px 4px;border-radius:var(--radius);border:${st==="ok"?"2px solid var(--success)":"0.5px solid var(--border)"};background:${st==="ok"?"var(--success-bg)":"var(--bg)"};font-size:12px;font-weight:${st==="ok"?"600":"400"};color:var(--success);">✓ OK</button>
      <button class="st-btn" data-id="${item.id}" data-val="problema" style="flex:1;padding:8px 4px;border-radius:var(--radius);border:${st==="problema"?"2px solid var(--danger)":"0.5px solid var(--border)"};background:${st==="problema"?"var(--danger-bg)":"var(--bg)"};font-size:12px;font-weight:${st==="problema"?"600":"400"};color:var(--danger);">✕ Problema</button>
      <button class="st-btn" data-id="${item.id}" data-val="na" style="flex:1;padding:8px 4px;border-radius:var(--radius);border:${st==="na"?"2px solid var(--border2)":"0.5px solid var(--border)"};background:${st==="na"?"var(--bg2)":"var(--bg)"};font-size:12px;font-weight:${st==="na"?"600":"400"};color:var(--text2);">— N/A</button>
    </div>
    <textarea class="ni" data-id="${item.id}" placeholder="Observação (opcional)..." style="min-height:60px;font-size:13px;margin-bottom:8px;">${note}</textarea>
    <input type="file" accept="image/*" capture="environment" class="pi" data-id="${item.id}" style="display:none;" />
    ${photo?`<div style="position:relative;"><img src="${photo}" alt="Foto" style="width:100%;border-radius:6px;max-height:160px;object-fit:cover;" /><button class="ph-chg" data-id="${item.id}" style="position:absolute;bottom:6px;right:6px;padding:4px 10px;font-size:11px;background:var(--bg);border-radius:4px;">Trocar foto</button></div>`:`<button class="ph-add" data-id="${item.id}" style="width:100%;padding:10px;border-radius:var(--radius);border:0.5px dashed var(--border2);background:transparent;font-size:13px;color:var(--text2);">📷 Adicionar foto</button>`}
  </div>`:""}
</div>`;
  });

  html+=`</div>
<div style="margin-top:1.5rem;"><span class="lbl">Observações gerais</span><textarea id="obs" placeholder="Observações adicionais sobre a máquina..." style="min-height:80px;">${f.observation}</textarea></div>

<div style="margin-top:1.25rem;border:0.5px dashed var(--border2);border-radius:var(--radius-lg);padding:14px 16px;">
  <div style="display:flex;align-items:center;gap:8px;margin-bottom:4px;">
    <span style="font-size:16px;">📎</span>
    <p style="font-size:14px;font-weight:600;">Complemento</p>
    <span class="pill" style="background:var(--bg2);color:var(--text2);">opcional</span>
  </div>
  <p style="font-size:12px;color:var(--text3);margin-bottom:12px;">Informações extras, fotos adicionais, detalhes que não se encaixam nos itens acima.</p>
  <textarea id="comp-note" placeholder="Anotações complementares..." style="min-height:70px;font-size:13px;margin-bottom:10px;">${f.compNote||""}</textarea>
  <div id="comp-photos" style="display:flex;flex-direction:column;gap:8px;margin-bottom:10px;">
    ${cp.map((p,i)=>`<div style="position:relative;"><img src="${p}" alt="Foto ${i+1}" style="width:100%;border-radius:6px;max-height:140px;object-fit:cover;" /><button class="comp-rm" data-idx="${i}" style="position:absolute;top:6px;right:6px;width:28px;height:28px;border-radius:50%;background:var(--danger-bg);border:none;color:var(--danger);font-size:16px;padding:0;display:flex;align-items:center;justify-content:center;">✕</button><span style="position:absolute;bottom:6px;left:8px;font-size:11px;color:#fff;background:rgba(0,0,0,0.5);padding:2px 6px;border-radius:4px;">Foto ${i+1}</span></div>`).join("")}
  </div>
  <input type="file" accept="image/*" capture="environment" id="comp-pi" style="display:none;" />
  <button id="comp-add" style="width:100%;padding:10px;border-radius:var(--radius);border:0.5px dashed var(--border2);background:transparent;font-size:13px;color:var(--text2);">
    📷 ${cp.length>0?"Adicionar mais uma foto":"Adicionar foto"}${cp.length>0?` <span class="pill" style="background:var(--info-bg);color:var(--info);margin-left:4px;">${cp.length}</span>`:""}
  </button>
</div>
<button id="btn-finish" style="padding:14px;border-radius:var(--radius);background:var(--success-bg);border:none;color:var(--success);font-weight:600;font-size:15px;width:100%;margin-top:1.25rem;">Revisar e finalizar →</button>`;
  w.insertAdjacentHTML("beforeend",html);
}

function rStep2(app) {
  const w=hdr(app,"Confirmar e salvar","step1"), f=S.form;
  const items=CHECKLISTS[f.type].items;
  const ok=items.filter(i=>f.items[i.id]==="ok"), prob=items.filter(i=>f.items[i.id]==="problema");
  const na=items.filter(i=>f.items[i.id]==="na"), unc=items.filter(i=>!f.items[i.id]);
  const cp=f.compPhotos||[];
  w.insertAdjacentHTML("beforeend",`
<div style="display:flex;flex-direction:column;gap:14px;">
  <div class="surface" style="border-radius:var(--radius-lg);padding:14px 16px;">
    <p style="font-weight:700;font-size:16px;">${f.model}</p>
    ${f.serial?`<p style="font-size:13px;color:var(--text2);margin-top:2px;">S/N: ${f.serial}</p>`:""}
    <p style="font-size:13px;color:var(--text2);margin-top:6px;">Mecânico: ${f.mechanic} · ${CHECKLISTS[f.type].label}</p>
  </div>
  <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;">
    <div class="surface" style="background:var(--success-bg);"><p style="font-size:11px;color:var(--success);">OK</p><p style="font-size:22px;font-weight:700;color:var(--success);">${ok.length}</p></div>
    <div class="surface" style="background:var(--danger-bg);"><p style="font-size:11px;color:var(--danger);">Problema</p><p style="font-size:22px;font-weight:700;color:var(--danger);">${prob.length}</p></div>
    <div class="surface"><p style="font-size:11px;color:var(--text2);">N/A</p><p style="font-size:22px;font-weight:700;color:var(--text2);">${na.length}</p></div>
    <div class="surface" style="background:var(--warning-bg);"><p style="font-size:11px;color:var(--warning);">Não verificado</p><p style="font-size:22px;font-weight:700;color:var(--warning);">${unc.length}</p></div>
  </div>
  ${prob.length>0?`<div style="background:var(--danger-bg);border-radius:var(--radius);padding:12px 14px;"><p style="font-weight:600;font-size:13px;color:var(--danger);margin-bottom:8px;">⚠ Itens com problema</p>${prob.map(p=>`<p style="font-size:13px;color:var(--danger);margin-bottom:2px;">· ${p.label}</p>`).join("")}</div>`:""}
  ${(f.compNote||cp.length>0)?`<div class="card"><p style="font-size:11px;color:var(--text3);text-transform:uppercase;letter-spacing:0.05em;margin-bottom:8px;">Complemento</p>${f.compNote?`<p style="font-size:13px;margin-bottom:6px;">${f.compNote}</p>`:""}${cp.length>0?`<p style="font-size:12px;color:var(--text2);">📎 ${cp.length} foto(s) complementar(es)</p>`:""}
  </div>`:""}
  <button id="btn-save" style="padding:14px;border-radius:var(--radius);background:var(--info-bg);border:none;color:var(--info);font-weight:600;font-size:15px;width:100%;">
    ${S.saving?"Salvando…":"💾 Salvar registro"}
  </button>
</div>`);
}

function rRecords(app) {
  const w=hdr(app,"Registros","home"), fl=S.filter||"todos";
  const filt=S.records.filter(r=>fl==="todos"||r.type===fl);
  let html=`<div style="display:flex;gap:6px;margin-bottom:1rem;">
    ${[["todos","Todos"],["envio","Envio"],["conserto","Conserto"]].map(([v,l])=>`<button class="fl-btn" data-f="${v}" style="padding:6px 12px;border-radius:99px;border:${fl===v?"2px solid var(--info)":"0.5px solid var(--border)"};background:${fl===v?"var(--info-bg)":"transparent"};font-size:13px;color:${fl===v?"var(--info)":"var(--text2)"};font-weight:${fl===v?"600":"400"};">${l}</button>`).join("")}
  </div>`;
  if(S.loading) html+=`<p style="color:var(--text2);text-align:center;padding:2rem;">Carregando...</p>`;
  else if(filt.length===0) html+=`<p style="color:var(--text2);text-align:center;padding:2rem;">Nenhum registro encontrado.</p>`;
  else {
    html+=`<div style="display:flex;flex-direction:column;gap:8px;">`;
    filt.forEach(r=>{
      const ok=(CHECKLISTS[r.type]?.items||[]).filter(i=>r.items?.[i.id]==="ok").length;
      const pr=(CHECKLISTS[r.type]?.items||[]).filter(i=>r.items?.[i.id]==="problema").length;
      const cp=(r.compPhotos||[]).length;
      html+=`<button class="rec-btn" data-rid="${r.id}" style="text-align:left;width:100%;padding:12px 14px;border-radius:var(--radius);">
        <div style="display:flex;justify-content:space-between;align-items:flex-start;">
          <div><p style="font-weight:600;font-size:14px;">${r.model}</p><p style="font-size:12px;color:var(--text2);margin-top:2px;">${r.mechanic} · ${CHECKLISTS[r.type]?.label}</p></div>
          <p style="font-size:11px;color:var(--text3);text-align:right;">${new Date(r.date).toLocaleDateString("pt-BR")}<br>${new Date(r.date).toLocaleTimeString("pt-BR",{hour:"2-digit",minute:"2-digit"})}</p>
        </div>
        <div style="display:flex;gap:6px;margin-top:8px;flex-wrap:wrap;">
          <span class="pill" style="background:var(--success-bg);color:var(--success);">${ok} OK</span>
          ${pr>0?`<span class="pill" style="background:var(--danger-bg);color:var(--danger);">${pr} prob.</span>`:""}
          ${cp>0?`<span class="pill" style="background:var(--bg2);color:var(--text2);">📎 ${cp} foto${cp>1?"s":""}</span>`:""}
        </div>
      </button>`;
    });
    html+=`</div>`;
  }
  w.insertAdjacentHTML("beforeend",html);
}

function rDetail(app) {
  const r=S.selected; if(!r)return;
  const w=hdr(app,"Detalhes","records"), cl=CHECKLISTS[r.type], cp=r.compPhotos||[];
  let html=`
<div class="surface" style="border-radius:var(--radius-lg);padding:14px 16px;margin-bottom:1rem;">
  <p style="font-weight:700;font-size:16px;">${r.model}</p>
  ${r.serial?`<p style="font-size:13px;color:var(--text2);margin-top:2px;">S/N: ${r.serial}</p>`:""}
  <p style="font-size:13px;color:var(--text2);margin-top:6px;">Mecânico: ${r.mechanic} · ${cl?.label}</p>
  <p style="font-size:12px;color:var(--text3);margin-top:4px;">${fmtDate(r.date)}</p>
</div>
<div style="display:flex;flex-direction:column;gap:6px;">`;
  (cl?.items||[]).forEach((item,idx)=>{
    const st=r.items?.[item.id], note=r.notes?.[item.id], photo=r.photos?.[item.id];
    html+=`<div style="border:0.5px solid var(--border);border-radius:var(--radius);overflow:hidden;">
      <div style="padding:10px 14px;background:${sb(st)};display:flex;gap:10px;align-items:center;">
        <span style="font-size:11px;color:${sc(st)};min-width:18px;font-weight:600;">${idx+1}</span>
        <span style="flex:1;font-size:13px;color:${sc(st)||"var(--text)"};">${item.label}</span>
        <span style="font-size:12px;color:${sc(st)};font-weight:600;white-space:nowrap;">${si(st)} ${sl(st)}</span>
      </div>
      ${(note||photo)?`<div style="padding:8px 14px;border-top:0.5px solid var(--border);">${note?`<p style="font-size:13px;color:var(--text2);">${note}</p>`:""}${photo?`<img src="${photo}" alt="Foto" style="margin-top:6px;width:100%;border-radius:6px;max-height:120px;object-fit:cover;" />`:""}
      </div>`:""}
    </div>`;
  });
  html+=`</div>`;
  if(r.observation) html+=`<div class="surface" style="margin-top:1rem;"><p style="font-size:11px;color:var(--text3);margin-bottom:4px;text-transform:uppercase;letter-spacing:0.05em;">Observações</p><p style="font-size:14px;">${r.observation}</p></div>`;
  if(r.compNote||cp.length>0) {
    html+=`<div class="card" style="margin-top:1rem;">
      <p style="font-size:14px;font-weight:600;margin-bottom:10px;">📎 Complemento</p>
      ${r.compNote?`<p style="font-size:13px;margin-bottom:10px;">${r.compNote}</p>`:""}
      ${cp.map((p,i)=>`<div style="margin-bottom:8px;position:relative;"><img src="${p}" alt="Complemento ${i+1}" style="width:100%;border-radius:6px;max-height:140px;object-fit:cover;" /><span style="position:absolute;bottom:6px;left:8px;font-size:11px;color:#fff;background:rgba(0,0,0,0.5);padding:2px 6px;border-radius:4px;">Foto ${i+1}</span></div>`).join("")}
    </div>`;
  }
  w.insertAdjacentHTML("beforeend",html);
}

// ── EVENTOS ──────────────────────────────────────────────
function bind() {
  document.querySelectorAll(".back-btn").forEach(b=>b.onclick=()=>{
    const t=b.dataset.t;
    if(t==="home") S.screen="home";
    else if(t==="records") S.screen="records";
    else if(t==="step0") { S.step=0; S.expanded={}; }
    else if(t==="step1") S.step=1;
    render();
  });
  document.querySelectorAll(".nav-btn").forEach(b=>b.onclick=()=>{
    S.screen=b.dataset.s;
    if(S.screen==="new") { S.form=nf(); S.step=0; S.expanded={}; }
    render();
  });
  document.querySelectorAll(".type-btn").forEach(b=>b.onclick=()=>{S.form.type=b.dataset.type;render();});
  document.querySelectorAll(".mec-btn").forEach(b=>b.onclick=()=>{S.form.mechanic=b.dataset.mec;render();});
  const im=document.getElementById("inp-model"); if(im)im.oninput=e=>S.form.model=e.target.value;
  const is=document.getElementById("inp-serial"); if(is)is.oninput=e=>S.form.serial=e.target.value;
  const bs=document.getElementById("btn-start");
  if(bs)bs.onclick=()=>{if(!S.form.mechanic||!S.form.model){alert("Selecione o mecânico e informe o modelo.");return;}S.step=1;S.expanded={};render();};
  document.querySelectorAll(".item-hdr").forEach(el=>el.onclick=()=>{persist();S.expanded[el.dataset.id]=!S.expanded[el.dataset.id];render();});
  document.querySelectorAll(".st-btn").forEach(b=>b.onclick=()=>{persist();S.form.items[b.dataset.id]=S.form.items[b.dataset.id]===b.dataset.val?undefined:b.dataset.val;render();});
  document.querySelectorAll(".ni").forEach(n=>n.oninput=e=>S.form.notes[n.dataset.id]=e.target.value);
  const obs=document.getElementById("obs"); if(obs)obs.oninput=e=>S.form.observation=e.target.value;
  document.querySelectorAll(".ph-add,.ph-chg").forEach(b=>b.onclick=()=>{document.querySelector(`.pi[data-id="${b.dataset.id}"]`)?.click();});
  document.querySelectorAll(".pi").forEach(inp=>inp.onchange=e=>{persist();readFile(e.target.files?.[0],data=>{S.form.photos[inp.dataset.id]=data;render();});});
  const ca=document.getElementById("comp-add"); if(ca)ca.onclick=()=>document.getElementById("comp-pi")?.click();
  const cpi=document.getElementById("comp-pi"); if(cpi)cpi.onchange=e=>{persist();readFile(e.target.files?.[0],data=>{if(!S.form.compPhotos)S.form.compPhotos=[];S.form.compPhotos.push(data);render();});};
  document.querySelectorAll(".comp-rm").forEach(b=>b.onclick=()=>{persist();S.form.compPhotos.splice(parseInt(b.dataset.idx),1);render();});
  const cn=document.getElementById("comp-note"); if(cn)cn.oninput=e=>S.form.compNote=e.target.value;
  const bf=document.getElementById("btn-finish"); if(bf)bf.onclick=()=>{persist();S.step=2;render();};
  const bsave=document.getElementById("btn-save"); if(bsave)bsave.onclick=()=>{if(!S.saving)submitForm();};
  document.querySelectorAll(".fl-btn").forEach(b=>b.onclick=()=>{S.filter=b.dataset.f;render();});
  document.querySelectorAll(".rec-btn").forEach(b=>b.onclick=()=>{const r=S.records.find(r=>r.id===b.dataset.rid);if(r){S.selected=r;S.screen="detail";render();}});
}

// ── INIT ─────────────────────────────────────────────────
window.onload = initFirebase;
</script>
</body>
</html>
