function initFirebase() {
  try {
    firebase.initializeApp(FIREBASE_CONFIG);
    S.db = firebase.firestore();
    loadRecords();
    loadChamados();
  } catch(e) {
    document.getElementById("app").innerHTML =
      `<div style="padding:2rem;color:var(--danger);">
        <p style="font-weight:500;margin-bottom:8px;">⚠️ Erro de configuração Firebase</p>

       </div>`;
  }
}

async function loadRecords() {
  S.loading = true; render();
  try {
    const snap = await S.db.collection("checklists").orderBy("date","desc").get();
    S.records = snap.docs.map(d => ({ id: d.id, ...d.data() }));
  } catch(e) { S.records = []; }
  S.loading = false; render();
}

async function getDeviceInfo() {
  const ua = navigator.userAgent;
  const sw = screen.width, sh = screen.height;
  const info = {
    userAgent: ua,
    screenRes: sw + "x" + sh,
    timestamp: new Date().toISOString(),
    timezone: Intl.DateTimeFormat().resolvedOptions().timeZone,
  };

  // ── BROWSER ──
  if (/EdgA|EdgiOS/.test(ua)) info.browser = "Edge";
  else if (/OPR|OPiOS/.test(ua)) info.browser = "Opera";
  else if (/CriOS/.test(ua)) info.browser = "Chrome (iOS)";
  else if (/Chrome/.test(ua) && !/Chromium/.test(ua)) info.browser = "Chrome";
  else if (/Firefox|FxiOS/.test(ua)) info.browser = "Firefox";
  else if (/Safari/.test(ua)) info.browser = "Safari";
  else info.browser = "Outro";

  // ── ANDROID: extract exact model ──
  if (/Android/.test(ua)) {
    const modelMatch = ua.match(/\(Linux;[^)]*;\s*([^)]+)\)/);
    let model = "Android";
    if (modelMatch) {
      // UA format: "...Build/..." - model is before Build
      const raw = modelMatch[1];
      const buildIdx = raw.indexOf(" Build");
      model = buildIdx > 0 ? raw.substring(0, buildIdx).trim() : raw.split(";").pop().trim();
      // Clean up common prefixes
      model = model.replace(/^Android\s+[\d.]+;\s*/i, "").trim();
    }
    // Brand detection
    const brands = ["Samsung","Motorola","Xiaomi","Redmi","POCO","LG","Sony","Nokia","Huawei","Honor","Realme","OnePlus","Vivo","Oppo","Asus","Lenovo","TCL","Alcatel","ZTE"];
    let brand = "";
    for (const b of brands) {
      if (model.toUpperCase().includes(b.toUpperCase()) || ua.includes(b)) { brand = b; break; }
    }
    info.device = (brand ? brand + " " : "") + model;
    info.os = "Android " + (ua.match(/Android\s+([\d.]+)/)?.[1] || "");
  }

  // ── iPHONE: identify model by screen resolution ──
  else if (/iPhone/.test(ua)) {
    const pxW = sw * (window.devicePixelRatio||1);
    const pxH = sh * (window.devicePixelRatio||1);
    const larger = Math.max(pxW, pxH);
    const smaller = Math.min(pxW, pxH);
    // Map physical pixels to iPhone model
    const iPhoneModels = {
      "2796x1290": "iPhone 14 Pro Max / 15 Pro Max",
      "2556x1179": "iPhone 14 Pro / 15 Pro",
      "2532x1170": "iPhone 12 / 13 / 14",
      "2778x1284": "iPhone 12 Pro Max / 13 Pro Max",
      "2436x1125": "iPhone X / XS / 11 Pro",
      "2688x1242": "iPhone XS Max / 11 Pro Max",
      "1792x828":  "iPhone XR / 11",
      "2340x1080": "iPhone 12 mini / 13 mini",
      "2208x1242": "iPhone 6s+ / 7+ / 8+",
      "1334x750":  "iPhone 6 / 6s / 7 / 8 / SE2",
      "2176x1080": "iPhone SE (3a geração)",
      "1136x640":  "iPhone SE (1a geração)",
    };
    const key = larger + "x" + smaller;
    info.device = "iPhone — " + (iPhoneModels[key] || "modelo " + key + "px");
    info.os = "iOS " + (ua.match(/OS\s+([\d_]+)/)?.[1]?.replace(/_/g,".") || "");
  }

  // ── iPad ──
  else if (/iPad/.test(ua) || (/Mac/.test(ua) && navigator.maxTouchPoints > 1)) {
    info.device = "iPad";
    info.os = "iPadOS";
  }

  // ── DESKTOP ──
  else if (/Windows NT/.test(ua)) {
    const ver = ua.match(/Windows NT ([\d.]+)/)?.[1];
    const winMap = {"10.0":"10/11","6.3":"8.1","6.2":"8","6.1":"7"};
    info.device = "PC Windows " + (winMap[ver] || ver || "");
    info.os = "Windows";
  }
  else if (/Macintosh/.test(ua)) {
    info.device = "Mac";
    info.os = "macOS " + (ua.match(/Mac OS X ([\d_]+)/)?.[1]?.replace(/_/g,".") || "");
  }
  else {
    info.device = "Dispositivo desconhecido";
    info.os = "";
  }

  // ── GPS ──
  try {
    const pos = await new Promise((res, rej) =>
      navigator.geolocation.getCurrentPosition(res, rej, {timeout: 6000})
    );
    info.gps = {
      lat: pos.coords.latitude.toFixed(6),
      lng: pos.coords.longitude.toFixed(6),
      accuracy: Math.round(pos.coords.accuracy) + "m"
    };
  } catch(e) {
    info.gps = null;
  }

  return info;
}

async function saveRecord(rec) {
  S.saving = true; render();
  try {
    const deviceInfo = await getDeviceInfo();
    rec.deviceInfo = deviceInfo;
    await S.db.collection("checklists").doc(rec.id).set(rec);
    await loadRecords();
    S.screen="records"; S.form=nf(); S.step=0; S.saving=false; render();
  } catch(e) {
    S.saving=false;
    alert("Erro ao salvar. Verifique sua conexão e tente novamente.");
    render();
  }
}

// ── CHAMADOS ─────────────────────────────────────────────
let chamados = [];

async function loadChamados() {
  try {
    const snap = await S.db.collection("chamados").orderBy("date","desc").get();
    chamados = snap.docs.map(d => ({ id: d.id, ...d.data() }));
  } catch(e) { chamados = []; }
}

async function saveChamado(ch) {
  await S.db.collection("chamados").doc(ch.id).set(ch);
  await loadChamados();
}

async function openNewChamado(data) {
  S.saving = true; render();
  try {
    const ch = {
      id: "ch" + Date.now(),
      date: new Date().toISOString(),
      status: "aberto",
      model: data.model,
      serial: data.serial,
      mechanic: data.mechanic,
      description: data.description,
      photos: data.photos || [],
      replies: []
    };
    await saveChamado(ch);
    S.selectedChamado = chamados.find(c => c.id === ch.id);
    S.screen = "chamado_detail";
    S.saving = false;
    render();
  } catch(e) { S.saving = false; alert("Erro ao abrir chamado."); render(); }
}

async function addReply(chamadoId, reply) {
  const ch = chamados.find(c => c.id === chamadoId);
  if (!ch) return;
  ch.replies = ch.replies || [];
  ch.replies.push(reply);
  // Auto status logic
  if (ch.status === "aberto" && reply.isFactory) ch.status = "andamento";
  if (ch.status === "resolvido" && !reply.reopen) {
    // keep resolved
  } else if (reply.reopen) {
    ch.status = "aberto";
  }
  await saveChamado(ch);
  S.selectedChamado = chamados.find(c => c.id === ch.id);
  render();
}

async function setChamadoStatus(chamadoId, status) {
  const ch = chamados.find(c => c.id === chamadoId);
  if (!ch) return;
  ch.status = status;
  await saveChamado(ch);
  S.selectedChamado = chamados.find(c => c.id === ch.id);
  render();
}

function statusStyle(st) {
  if (st === "aberto")    return { bg:"var(--danger-bg)",    text:"var(--danger)",    label:"● ABERTO" };
  if (st === "andamento") return { bg:"var(--warning-bg)",   text:"var(--warning)",   label:"● EM ANDAMENTO" };
  if (st === "resolvido") return { bg:"var(--success-bg)",   text:"var(--success)",   label:"✓ RESOLVIDO" };
  return { bg:"var(--bg2)", text:"var(--text2)", label:st };
}

        let w2=img.width, h2=img.height, max=1024;
        if(w2>max){h2=Math.round(h2*max/w2);w2=max;}
        if(h2>max){w2=Math.round(w2*max/h2);h2=max;}
        canvas.width=w2; canvas.height=h2;

        S.chamadoForm.photos.push(canvas.toDataURL("image/jpeg",0.65));
        render();
      };
      img.src = ev.target.result;
    };
    reader.readAsDataURL(file);
  };

function submitForm() {
  const f = S.form;
  if (!f.mechanic || !f.model) { alert("Selecione o mecânico e informe o modelo."); return; }
  const unc = CHECKLISTS[f.type].items.filter(i => !f.items[i.id]);
  if (unc.length > 0 && !confirm(`${unc.length} item(s) não verificado(s). Salvar assim mesmo?`)) return;
  if (S.screen === "edit") {
    submitEdit();
  } else {
    saveRecord({ ...f, id:"r"+Date.now(), date: new Date().toISOString() });
  }
}

function checkPass() {
  const p = prompt("Digite a senha de acesso:");
  return p === "373737";
}

function generateDiff(oldRec, newRec) {
  const changes = [];
  const cl = CHECKLISTS[oldRec.type] || CHECKLISTS[newRec.type];
  if (oldRec.mechanic !== newRec.mechanic) changes.push(`Mecânico: "${oldRec.mechanic}" → "${newRec.mechanic}"`);
  if (oldRec.model !== newRec.model) changes.push(`Modelo: "${oldRec.model}" → "${newRec.model}"`);
  if ((oldRec.serial||"") !== (newRec.serial||"")) changes.push(`N° série: "${oldRec.serial||"—"}" → "${newRec.serial||"—"}"`);
  (cl?.items||[]).forEach(item => {
    const ov = oldRec.items?.[item.id], nv = newRec.items?.[item.id];
    if (ov !== nv) changes.push(`"${item.label}": ${sl(ov)} → ${sl(nv)}`);
    const on = oldRec.notes?.[item.id]||"", nn = newRec.notes?.[item.id]||"";
    if (on !== nn) changes.push(`Obs. "${item.label}": "${on||"—"}" → "${nn||"—"}"`);
  });
  if ((oldRec.observation||"") !== (newRec.observation||"")) changes.push(`Observações gerais alteradas`);
  if ((oldRec.compNote||"") !== (newRec.compNote||"")) changes.push(`Complemento (texto) alterado`);
  const oldPhotos = (oldRec.compPhotos||[]).length, newPhotos = (newRec.compPhotos||[]).length;
  if (oldPhotos !== newPhotos) changes.push(`Fotos complemento: ${oldPhotos} → ${newPhotos}`);
  return changes;
}

function submitEdit() {
  const f = S.form;
  if (!f.mechanic || !f.model) { alert("Selecione o mecânico e informe o modelo."); return; }
  const orig = S.editingRecord;
  const changes = generateDiff(orig, f);
  const histEntry = {
    date: new Date().toISOString(),
    mechanic: f.mechanic,
    changes: changes.length > 0 ? changes : ["Nenhuma alteração detectada"]
  };
  const updated = {
    ...f,
    id: orig.id,
    date: orig.date,
    editHistory: [...(orig.editHistory||[]), histEntry]
  };
  saveRecord(updated);
}

function persist() {
  const o=document.getElementById("obs"); if(o) S.form.observation=o.value;
  const c=document.getElementById("comp-note"); if(c) S.form.compNote=c.value;
  document.querySelectorAll(".ni").forEach(n => { S.form.notes[n.dataset.id]=n.value; });
}

function readFile(file, cb) {
  if (!file) return;
  const reader = new FileReader();
  reader.onload = e => {
    const img = new Image();
    img.onload = () => {
      const canvas = document.createElement('canvas');
      const maxW = 1024, maxH = 1024;
      let w = img.width, h = img.height;
      if (w > maxW) { h = Math.round(h * maxW / w); w = maxW; }
      if (h > maxH) { w = Math.round(w * maxH / h); h = maxH; }
      canvas.width = w; canvas.height = h;
      canvas.getContext('2d').drawImage(img, 0, 0, w, h);
      cb(canvas.toDataURL('image/jpeg', 0.65));
    };
    img.src = e.target.result;
  };
  reader.readAsDataURL(file);
}

function fmtDate(iso) {
  const d = new Date(iso);
  return d.toLocaleDateString("pt-BR") + " " + d.toLocaleTimeString("pt-BR",{hour:"2-digit",minute:"2-digit"});
}

function sc(st) { return st==="ok"?"var(--success)":st==="problema"?"var(--danger)":st==="na"?"var(--text2)":"var(--text3)"; }
function sb(st) { return st==="ok"?"var(--success-bg)":st==="problema"?"var(--danger-bg)":st==="na"?"var(--bg2)":"var(--bg)"; }
function si(st) { return st==="ok"?"✓":st==="problema"?"✕":st==="na"?"—":"○"; }
function sl(st) { return st==="ok"?"OK":st==="problema"?"Problema":st==="na"?"N/A":"—"; }

function render() {
  const app = document.getElementById("app");
  app.innerHTML = "";
  if (S.screen==="home")    rHome(app);
  else if (S.screen==="new") { if(S.step===0) rStep0(app); else if(S.step===1) rStep1(app); else rStep2(app); }
  else if (S.screen==="edit") { if(S.step===0) rStep0(app); else if(S.step===1) rStep1(app); else rStep2(app); }
  else if (S.screen==="records") rRecords(app);
  else if (S.screen==="detail")  rDetail(app);
  else if (S.screen==="chamados") rChamados(app);
  else if (S.screen==="chamado_new") rChamadoNew(app);
  else if (S.screen==="chamado_detail") rChamadoDetail(app);
  else if (S.screen==="history") rHistory(app);
  else if (S.screen==="dashboard") rDashboard(app);
  bind();
}

    html = `<div style="text-align:center;padding:3rem 1rem;color:var(--text2);">
      <p style="font-size:32px;margin-bottom:12px;">📋</p>
      <p>Nenhuma edição registrada.</p>
    </div>`;
  } else {
    html = `<div style="display:flex;flex-direction:column;gap:12px;">`;
    [...hist].reverse().forEach((h,i) => {
      html += `<div class="card" style="border-radius:var(--radius-lg);">
        <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:10px;">
          <div>
            <p style="font-weight:600;font-size:14px;">${h.mechanic}</p>
            <p style="font-size:12px;color:var(--text3);margin-top:2px;">${fmtDate(h.date)}</p>
          </div>
          <span style="font-size:11px;padding:2px 8px;border-radius:99px;background:var(--bg2);color:var(--text2);">Edição ${hist.length - i}</span>
        </div>
        <div style="border-top:0.5px solid var(--border);padding-top:8px;display:flex;flex-direction:column;gap:4px;">
          ${h.changes.map(c=>`<p style="font-size:13px;color:var(--text2);">· ${c}</p>`).join("")}
        </div>
      </div>`;
    });
    html += `</div>`;
  }
  w.insertAdjacentHTML("beforeend", html);
}

// ── EVENTOS ──────────────────────────────────────────────
function bind() {
  document.querySelectorAll(".back-btn").forEach(b=>b.onclick=()=>{
    const t=b.dataset.t;
    if(t==="home") S.screen="home";
    else if(t==="records") S.screen="records";
    else if(t==="step0") { S.step=0; S.expanded={}; }
    else if(t==="step1") S.step=1;
    render();
  });
  document.querySelectorAll(".nav-btn").forEach(b=>b.onclick=()=>{
    S.screen=b.dataset.s;
    if(S.screen==="new") { S.form=nf(); S.step=0; S.expanded={}; }
    if(S.screen!=="records") S.search="";
    render();
  });
  document.querySelectorAll(".type-btn").forEach(b=>b.onclick=()=>{S.form.type=b.dataset.type;render();});
  document.querySelectorAll(".mec-btn").forEach(b=>b.onclick=()=>{S.form.mechanic=b.dataset.mec;render();});
  const im=document.getElementById("inp-model"); if(im)im.oninput=e=>S.form.model=e.target.value;
  const is=document.getElementById("inp-serial"); if(is)is.oninput=e=>S.form.serial=e.target.value;
  const bs=document.getElementById("btn-start");
  if(bs)bs.onclick=()=>{if(!S.form.mechanic||!S.form.model){alert("Selecione o mecânico e informe o modelo.");return;}S.step=1;S.expanded={};render();};
  document.querySelectorAll(".item-hdr").forEach(el=>el.onclick=()=>{persist();S.expanded[el.dataset.id]=!S.expanded[el.dataset.id];render();});
  document.querySelectorAll(".st-btn").forEach(b=>b.onclick=()=>{persist();S.form.items[b.dataset.id]=S.form.items[b.dataset.id]===b.dataset.val?undefined:b.dataset.val;render();});
  document.querySelectorAll(".ni").forEach(n=>n.oninput=e=>S.form.notes[n.dataset.id]=e.target.value);
  const obs=document.getElementById("obs"); if(obs)obs.oninput=e=>S.form.observation=e.target.value;
  document.querySelectorAll(".ph-add,.ph-chg").forEach(b=>b.onclick=()=>{document.querySelector(`.pi[data-id="${b.dataset.id}"]`)?.click();});
  document.querySelectorAll(".pi").forEach(inp=>inp.onchange=e=>{persist();readFile(e.target.files?.[0],data=>{S.form.photos[inp.dataset.id]=data;render();});});
  const ca=document.getElementById("comp-add"); if(ca)ca.onclick=()=>document.getElementById("comp-pi")?.click();
  const cpi=document.getElementById("comp-pi"); if(cpi)cpi.onchange=e=>{persist();readFile(e.target.files?.[0],data=>{if(!S.form.compPhotos)S.form.compPhotos=[];S.form.compPhotos.push(data);render();});};
  document.querySelectorAll(".comp-rm").forEach(b=>b.onclick=()=>{persist();S.form.compPhotos.splice(parseInt(b.dataset.idx),1);render();});
  const cn=document.getElementById("comp-note"); if(cn)cn.oninput=e=>S.form.compNote=e.target.value;
  const bf=document.getElementById("btn-finish"); if(bf)bf.onclick=()=>{persist();S.step=2;render();};
  const bsave=document.getElementById("btn-save"); if(bsave)bsave.onclick=()=>{if(!S.saving)submitForm();};

  document.querySelectorAll(".rec-btn").forEach(b=>b.onclick=()=>{const r=S.records.find(r=>r.id===b.dataset.rid);if(r){S.selected=r;S.screen="detail";render();}});



  // PDF button
  const pdfBtn = document.querySelector(".pdf-btn");
  if(pdfBtn) pdfBtn.onclick = async () => {
    pdfBtn.textContent = "⏳ Gerando PDF...";
    pdfBtn.style.opacity = "0.7";
    pdfBtn.disabled = true;
    try {
      await generatePDF(S.selected);
    } catch(e) {
      alert("Erro ao gerar PDF. Tente novamente.");
      console.error(e);
    }
    pdfBtn.textContent = "📄 Gerar relatório PDF";
    pdfBtn.style.opacity = "1";
    pdfBtn.disabled = false;
  };

  // Edit button
  const editBtn = document.querySelector(".edit-btn");
  if(editBtn) editBtn.onclick = () => {
    if(!checkPass()) { alert("Senha incorreta."); return; }
    const r = S.selected;
    S.editingRecord = JSON.parse(JSON.stringify(r));
    S.form = {
      mechanic: r.mechanic, type: r.type, model: r.model, serial: r.serial||"",
      items: {...(r.items||{})}, notes: {...(r.notes||{})}, photos: {...(r.photos||{})},
      observation: r.observation||"", compNote: r.compNote||"", compPhotos: [...(r.compPhotos||[])]
    };
    S.screen = "edit"; S.step = 0; S.expanded = {}; render();
  };

  // History button
  const histBtn = document.querySelector(".hist-btn");
  if(histBtn) histBtn.onclick = () => {
    if(!checkPass()) { alert("Senha incorreta."); return; }
    S.screen = "history"; render();
  };

  // Delete button
  const delBtn = document.querySelector(".del-btn");
  if(delBtn) delBtn.onclick = async () => {
    if(!checkPass()) { alert("Senha incorreta."); return; }
    if(!confirm(`Excluir o registro "${S.selected.model}"? Esta ação não pode ser desfeita.`)) return;
    try {
      await S.db.collection("checklists").doc(S.selected.id).delete();
      S.screen = "records"; S.selected = null;
      await loadRecords();
    } catch(e) { alert("Erro ao excluir. Tente novamente."); }
  };
}

// ── INIT ─────────────────────────────────────────────────
// ── GERAÇÃO DE PDF ───────────────────────────────────────
async function generatePDF(record) {
  const { jsPDF } = window.jspdf;
  const doc = new jsPDF({ orientation: 'portrait', unit: 'mm', format: 'a4' });
  const cl = CHECKLISTS[record.type];
  const pageW = 210, pageH = 297, margin = 14, contentW = pageW - margin * 2;
  let y = 0;

  const colors = {
    primary:   [24,  95, 165],
    success:   [59, 109,  17],
    successBg: [234,243,222],
    danger:    [163, 45,  45],
    dangerBg:  [252,235,235],
    warning:   [133, 79,  11],
    warningBg: [250,238,218],
    gray:      [120,120,115],
    grayBg:    [245,245,243],
    dark:      [ 26, 26, 24],
    white:     [255,255,255],
    border:    [220,220,215],
  };

  function setColor(c) { doc.setTextColor(...c); }
  function setFill(c)  { doc.setFillColor(...c); }
  function setDraw(c)  { doc.setDrawColor(...c); }

  function checkPage(needed = 10) {
    if (y + needed > pageH - 16) {
      doc.addPage();
      y = 16;
      drawPageFooter();
    }
  }

  function drawPageFooter() {
    const pg = doc.internal.getCurrentPageInfo().pageNumber;
    setColor(colors.gray);
    doc.setFontSize(8);
    doc.text(`Grupo NS Oficina · Assistência Técnica RICOMA`, margin, pageH - 8);
    doc.text(`Página ${pg}`, pageW - margin, pageH - 8, { align: 'right' });
    setDraw(colors.border);
    doc.line(margin, pageH - 12, pageW - margin, pageH - 12);
  }

  // ── HEADER ──
  setFill(colors.primary);
  doc.rect(0, 0, pageW, 42, 'F');

  // Logo area
  setColor(colors.white);
  doc.setFontSize(18);
  doc.setFont('helvetica', 'bold');
  doc.text('Grupo NS Oficina', margin, 16);
  doc.setFontSize(10);
  doc.setFont('helvetica', 'normal');
  doc.text('Assistência Técnica · Máquinas RICOMA', margin, 23);

  // Report title right side
  doc.setFontSize(9);
  doc.text(cl.label.toUpperCase(), pageW - margin, 14, { align: 'right' });
  doc.setFontSize(8);
  doc.text(new Date(record.date).toLocaleDateString('pt-BR', { day:'2-digit', month:'long', year:'numeric' }), pageW - margin, 20, { align: 'right' });
  doc.text(new Date(record.date).toLocaleTimeString('pt-BR', { hour:'2-digit', minute:'2-digit' }), pageW - margin, 26, { align: 'right' });

  // Divider line in header
  doc.setLineWidth(0.3);
  setDraw([255,255,255,0.3]);
  doc.line(margin, 32, pageW - margin, 32);

  // Subtitle
  doc.setFontSize(8);
  setColor([200, 220, 245]);
  doc.text('RELATÓRIO DE VERIFICAÇÃO DE EQUIPAMENTO', margin, 38);

  y = 50;

  // ── MACHINE INFO CARD ──
  setFill(colors.grayBg);
  setDraw(colors.border);
  doc.setLineWidth(0.3);
  doc.roundedRect(margin, y, contentW, 28, 2, 2, 'FD');

  setColor(colors.gray);
  doc.setFontSize(7.5);
  doc.setFont('helvetica', 'bold');
  doc.text('DADOS DO EQUIPAMENTO', margin + 4, y + 7);

  doc.setLineWidth(0.2);
  setDraw(colors.border);
  doc.line(margin + 4, y + 9, margin + contentW - 4, y + 9);

  const col1 = margin + 4, col2 = margin + contentW / 2 + 2;
  const di2 = record.deviceInfo || {};
  const cardH = di2.device ? 38 : 28;

  doc.setFontSize(8);
  doc.setFont('helvetica', 'bold');
  setColor(colors.dark);

  doc.text('Modelo:', col1, y + 15);
  doc.setFont('helvetica', 'normal');
  doc.text(record.model || '—', col1 + 18, y + 15);

  doc.setFont('helvetica', 'bold');
  doc.text('N° Série:', col2, y + 15);
  doc.setFont('helvetica', 'normal');
  doc.text(record.serial || '—', col2 + 20, y + 15);

  doc.setFont('helvetica', 'bold');
  doc.text('Mecânico:', col1, y + 22);
  doc.setFont('helvetica', 'normal');
  doc.text(record.mechanic || '—', col1 + 22, y + 22);

  doc.setFont('helvetica', 'bold');
  doc.text('Data:', col2, y + 22);
  doc.setFont('helvetica', 'normal');
  doc.text(new Date(record.date).toLocaleDateString('pt-BR'), col2 + 13, y + 22);

  if (di2.device) {
    setColor(colors.gray);
    doc.setFontSize(7.5);
    doc.setFont('helvetica', 'bold');
    doc.text('Assinatura digital:', col1, y + 30);
    doc.setFont('helvetica', 'normal');
    const deviceStr = (di2.device || '') + ' · ' + (di2.os || '') + ' · ' + (di2.browser || '');
    doc.text(doc.splitTextToSize(deviceStr, contentW - 38)[0], col1 + 34, y + 30);
    const gpsStr = di2.gps ? ('GPS: ' + di2.gps.lat + ', ' + di2.gps.lng + ' (±' + di2.gps.accuracy + ')') : 'GPS: não fornecido';
    doc.text(gpsStr, col1, y + 36);
  }

  y += cardH + 6;

  // ── SUMMARY BADGES ──
  const items = cl.items || [];
  const okCount    = items.filter(i => record.items?.[i.id] === 'ok').length;
  const probCount  = items.filter(i => record.items?.[i.id] === 'problema').length;
  const naCount    = items.filter(i => record.items?.[i.id] === 'na').length;
  const uncCount   = items.filter(i => !record.items?.[i.id]).length;

  const badgeW = (contentW - 9) / 4, badgeH = 16;
  const badges = [
    { label: 'OK', count: okCount, bg: colors.successBg, text: colors.success },
    { label: 'Problema', count: probCount, bg: colors.dangerBg, text: colors.danger },
    { label: 'N/A', count: naCount, bg: colors.grayBg, text: colors.gray },
    { label: 'Não verif.', count: uncCount, bg: colors.warningBg, text: colors.warning },
  ];

  badges.forEach((b, i) => {
    const bx = margin + i * (badgeW + 3);
    setFill(b.bg); setDraw(colors.border);
    doc.setLineWidth(0.3);
    doc.roundedRect(bx, y, badgeW, badgeH, 2, 2, 'FD');
    setColor(b.text);
    doc.setFontSize(7); doc.setFont('helvetica', 'normal');
    doc.text(b.label, bx + badgeW / 2, y + 5.5, { align: 'center' });
    doc.setFontSize(14); doc.setFont('helvetica', 'bold');
    doc.text(String(b.count), bx + badgeW / 2, y + 13, { align: 'center' });
  });

  y += 22;

  // ── SECTION TITLE: ITENS ──
  setFill(colors.primary);
  doc.rect(margin, y, contentW, 8, 'F');
  setColor(colors.white);
  doc.setFontSize(8); doc.setFont('helvetica', 'bold');
  doc.text('VERIFICAÇÃO DOS ITENS', margin + 4, y + 5.5);
  y += 12;

  // ── CHECKLIST ITEMS ──
  items.forEach((item, idx) => {
    const st = record.items?.[item.id];
    const note = record.notes?.[item.id];
    const hasNote = note && note.trim().length > 0;
    const rowH = hasNote ? 16 : 10;

    checkPage(rowH + 3);

    const bg = st === 'ok' ? colors.successBg : st === 'problema' ? colors.dangerBg : st === 'na' ? colors.grayBg : [255,255,255];
    const tc = st === 'ok' ? colors.success : st === 'problema' ? colors.danger : st === 'na' ? colors.gray : colors.gray;
    const statusLabel = st === 'ok' ? 'OK' : st === 'problema' ? 'PROBLEMA' : st === 'na' ? 'N/A' : '—';

    setFill(bg); setDraw(colors.border);
    doc.setLineWidth(0.2);
    doc.roundedRect(margin, y, contentW, rowH, 1, 1, 'FD');

    // Number
    setColor(colors.gray);
    doc.setFontSize(7); doc.setFont('helvetica', 'normal');
    doc.text(String(idx + 1).padStart(2, '0'), margin + 3, y + 6.5);

    // Item label
    setColor(colors.dark);
    doc.setFontSize(8.5); doc.setFont('helvetica', 'normal');
    doc.text(item.label, margin + 10, y + 6.5);

    // Status badge
    const statusW = 22;
    const stBg = st === 'ok' ? colors.success : st === 'problema' ? colors.danger : colors.gray;
    setFill(stBg);
    doc.roundedRect(margin + contentW - statusW - 2, y + 2, statusW, 6, 1, 1, 'F');
    setColor(colors.white);
    doc.setFontSize(6.5); doc.setFont('helvetica', 'bold');
    doc.text(statusLabel, margin + contentW - statusW / 2 - 2, y + 6, { align: 'center' });

    // Note
    if (hasNote) {
      setColor(colors.gray);
      doc.setFontSize(7.5); doc.setFont('helvetica', 'italic');
      const noteLines = doc.splitTextToSize(`Obs: ${note}`, contentW - 40);
      doc.text(noteLines[0], margin + 10, y + 12);
    }

    y += rowH + 1.5;
  });

  // ── OBSERVATIONS ──
  if (record.observation && record.observation.trim()) {
    checkPage(24);
    y += 4;
    setFill(colors.grayBg); setDraw(colors.border);
    doc.setLineWidth(0.3);
    const obsLines = doc.splitTextToSize(record.observation, contentW - 8);
    const obsH = 14 + obsLines.length * 5;
    doc.roundedRect(margin, y, contentW, obsH, 2, 2, 'FD');
    setColor(colors.gray);
    doc.setFontSize(7.5); doc.setFont('helvetica', 'bold');
    doc.text('OBSERVAÇÕES GERAIS', margin + 4, y + 6);
    setColor(colors.dark);
    doc.setFontSize(8.5); doc.setFont('helvetica', 'normal');
    doc.text(obsLines, margin + 4, y + 12);
    y += obsH + 4;
  }

  // ── COMPLEMENTO ──
  if (record.compNote && record.compNote.trim()) {
    checkPage(20);
    y += 2;
    setFill([255,251,235]); setDraw(colors.border);
    doc.setLineWidth(0.3);
    const compLines = doc.splitTextToSize(record.compNote, contentW - 8);
    const compH = 14 + compLines.length * 5;
    doc.roundedRect(margin, y, contentW, compH, 2, 2, 'FD');
    setColor(colors.warning);
    doc.setFontSize(7.5); doc.setFont('helvetica', 'bold');
    doc.text('COMPLEMENTO', margin + 4, y + 6);
    setColor(colors.dark);
    doc.setFontSize(8.5); doc.setFont('helvetica', 'normal');
    doc.text(compLines, margin + 4, y + 12);
    y += compH + 4;
  }

  // ── HELPER: add image preserving aspect ratio ──
  function addImageFit(dataUrl, x, maxW, maxH) {
    return new Promise(resolve => {
      const img = new Image();
      img.onload = () => {
        const iw = img.naturalWidth, ih = img.naturalHeight;
        let drawW = maxW, drawH = (ih / iw) * maxW;
        if (drawH > maxH) { drawH = maxH; drawW = (iw / ih) * maxH; }
        const cx = x + (maxW - drawW) / 2;
        try { doc.addImage(dataUrl, 'JPEG', cx, y, drawW, drawH, '', 'MEDIUM'); } catch(e) {}
        resolve(drawH);
      };
      img.onerror = () => resolve(0);
      img.src = dataUrl;
    });
  }

  // ── COMPLEMENT PHOTOS (2 per row) ──
  const compPhotos = record.compPhotos || [];
  if (compPhotos.length > 0) {
    checkPage(20);
    y += 2;
    setFill(colors.grayBg); setDraw(colors.border);
    doc.setLineWidth(0.3);
    doc.roundedRect(margin, y, contentW, 8, 2, 2, 'FD');
    setColor(colors.gray);
    doc.setFontSize(7.5); doc.setFont('helvetica', 'bold');
    doc.text(`FOTOS COMPLEMENTARES (${compPhotos.length})`, margin + 4, y + 5.5);
    y += 12;

    const colW = (contentW - 4) / 2;
    const maxPhotoH = 65;
    for (let i = 0; i < compPhotos.length; i += 2) {
      checkPage(maxPhotoH + 12);
      const rowStartY = y;
      let leftH = 0, rightH = 0;

      // Left photo
      try {
        const img1 = new Image();
        await new Promise(res => {
          img1.onload = () => {
            const iw=img1.naturalWidth, ih=img1.naturalHeight;
            let dw=colW, dh=(ih/iw)*colW;
            if(dh>maxPhotoH){dh=maxPhotoH;dw=(iw/ih)*maxPhotoH;}
            const cx=margin+(colW-dw)/2;
            try{doc.addImage(compPhotos[i],'JPEG',cx,rowStartY,dw,dh,'','MEDIUM');}catch(e){}
            setColor(colors.gray); doc.setFontSize(6.5); doc.setFont('helvetica','normal');
            doc.text(`Foto ${i+1}`, margin+colW/2, rowStartY+dh+4, {align:'center'});
            leftH = dh + 6;
            res();
          };
          img1.onerror=()=>res();
          img1.src=compPhotos[i];
        });
      } catch(e){}

      // Right photo (if exists)
      if (compPhotos[i+1]) {
        try {
          const img2 = new Image();
          await new Promise(res => {
            img2.onload = () => {
              const iw=img2.naturalWidth, ih=img2.naturalHeight;
              let dw=colW, dh=(ih/iw)*colW;
              if(dh>maxPhotoH){dh=maxPhotoH;dw=(iw/ih)*maxPhotoH;}
              const rx=margin+colW+4;
              const cx=rx+(colW-dw)/2;
              try{doc.addImage(compPhotos[i+1],'JPEG',cx,rowStartY,dw,dh,'','MEDIUM');}catch(e){}
              setColor(colors.gray); doc.setFontSize(6.5); doc.setFont('helvetica','normal');
              doc.text(`Foto ${i+2}`, rx+colW/2, rowStartY+dh+4, {align:'center'});
              rightH = dh + 6;
              res();
            };
            img2.onerror=()=>res();
            img2.src=compPhotos[i+1];
          });
        } catch(e){}
      }

      y += Math.max(leftH, rightH) + 4;
    }
  }

  // ── ITEM PHOTOS (2 per row) ──
  const itemsWithPhotos = items.filter(item => record.photos?.[item.id]);
  if (itemsWithPhotos.length > 0) {
    checkPage(20);
    y += 2;
    setFill(colors.grayBg); setDraw(colors.border);
    doc.setLineWidth(0.3);
    doc.roundedRect(margin, y, contentW, 8, 2, 2, 'FD');
    setColor(colors.gray);
    doc.setFontSize(7.5); doc.setFont('helvetica', 'bold');
    doc.text(`FOTOS DOS ITENS (${itemsWithPhotos.length})`, margin + 4, y + 5.5);
    y += 12;

    const colW2 = (contentW - 4) / 2;
    const maxItemH = 65;
    for (let i = 0; i < itemsWithPhotos.length; i += 2) {
      checkPage(maxItemH + 20);
      const rowStartY = y;
      let leftH = 0, rightH = 0;

      // Left item photo
      const item1 = itemsWithPhotos[i];
      setColor(colors.dark); doc.setFontSize(7); doc.setFont('helvetica','bold');
      const lbl1 = doc.splitTextToSize(item1.label, colW2 - 2);
      doc.text(lbl1, margin, rowStartY + 5);
      const labelH = lbl1.length * 4.5;
      try {
        const img1 = new Image();
        await new Promise(res => {
          img1.onload = () => {
            const iw=img1.naturalWidth, ih=img1.naturalHeight;
            let dw=colW2, dh=(ih/iw)*colW2;
            if(dh>maxItemH){dh=maxItemH;dw=(iw/ih)*maxItemH;}
            const cx=margin+(colW2-dw)/2;
            try{doc.addImage(record.photos[item1.id],'JPEG',cx,rowStartY+labelH+3,dw,dh,'','MEDIUM');}catch(e){}
            leftH = labelH + dh + 5;
            res();
          };
          img1.onerror=()=>res();
          img1.src=record.photos[item1.id];
        });
      } catch(e){}

      // Right item photo (if exists)
      if (itemsWithPhotos[i+1]) {
        const item2 = itemsWithPhotos[i+1];
        const rx = margin + colW2 + 4;
        setColor(colors.dark); doc.setFontSize(7); doc.setFont('helvetica','bold');
        const lbl2 = doc.splitTextToSize(item2.label, colW2 - 2);
        doc.text(lbl2, rx, rowStartY + 5);
        const labelH2 = lbl2.length * 4.5;
        try {
          const img2 = new Image();
          await new Promise(res => {
            img2.onload = () => {
              const iw=img2.naturalWidth, ih=img2.naturalHeight;
              let dw=colW2, dh=(ih/iw)*colW2;
              if(dh>maxItemH){dh=maxItemH;dw=(iw/ih)*maxItemH;}
              const cx=rx+(colW2-dw)/2;
              try{doc.addImage(record.photos[item2.id],'JPEG',cx,rowStartY+labelH2+3,dw,dh,'','MEDIUM');}catch(e){}
              rightH = labelH2 + dh + 5;
              res();
            };
            img2.onerror=()=>res();
            img2.src=record.photos[item2.id];
          });
        } catch(e){}
      }

      y += Math.max(leftH, rightH) + 6;
    }
  }

  // ── SIGNATURE AREA ──
  checkPage(36);
  y += 6;
  setDraw(colors.border);
  doc.setLineWidth(0.3);
  doc.line(margin, y + 18, margin + 70, y + 18);
  doc.line(margin + contentW - 70, y + 18, margin + contentW, y + 18);
  setColor(colors.gray);
  doc.setFontSize(7.5); doc.setFont('helvetica', 'normal');
  doc.text('Assinatura do Mecânico', margin + 35, y + 23, { align: 'center' });
  doc.text('Assinatura do Responsável', margin + contentW - 35, y + 23, { align: 'center' });
  doc.setFontSize(8); doc.setFont('helvetica', 'bold');
  setColor(colors.dark);
  doc.text(record.mechanic, margin + 35, y + 28, { align: 'center' });

  // Footer on all pages
  const totalPages = doc.internal.getNumberOfPages();
  for (let i = 1; i <= totalPages; i++) {
    doc.setPage(i);
    drawPageFooter();
  }

  // ── SAVE ──
  const dateStr = new Date(record.date).toLocaleDateString('pt-BR').replace(/\//g, '-');
  const modelStr = (record.model || 'maquina').replace(/\s+/g, '_');
  doc.save(`Checklist_${modelStr}_${dateStr}.pdf`);
}

function rDashboard(app) {
  const w = hdr(app, "Dashboard", "home");
  if (!S.dashTab) S.dashTab = "envio";
  const tab = S.dashTab;
  const recs = S.records.filter(r => r.type === tab);

  // Tabs
  let tabHtml = '<div style="display:flex;gap:6px;margin-bottom:16px;">';
  Object.entries(CHECKLISTS).forEach(([k, v]) => {
    const active = tab === k;
    const short = v.label.replace("Preparação para ","").replace("Checklist de ","");
    const count = S.records.filter(r => r.type === k).length;
    tabHtml += '<button class="dash-tab-btn" data-tab="'+k+'" style="flex:1;padding:9px 6px;border-radius:var(--radius);font-size:12px;font-weight:'+(active?"600":"400")+';border:'+(active?"2px solid var(--info)":"0.5px solid var(--border)")+';background:'+(active?"var(--info-bg)":"var(--bg)")+';color:'+(active?"var(--info)":"var(--text2)")+';text-align:center;">';
    tabHtml += short + '<br><span style="font-size:11px;opacity:0.8;">'+count+' reg.</span>';
    tabHtml += '</button>';
  });
  tabHtml += '</div>';
  w.insertAdjacentHTML("beforeend", tabHtml);
  document.querySelectorAll(".dash-tab-btn").forEach(b => b.onclick = () => { S.dashTab = b.dataset.tab; render(); });
  const now = new Date();
  const thisMonth = recs.filter(r => { const d=new Date(r.date); return d.getMonth()===now.getMonth()&&d.getFullYear()===now.getFullYear(); });
  const lastMonth = recs.filter(r => { const d=new Date(r.date); const lm=new Date(now.getFullYear(),now.getMonth()-1,1); return d.getMonth()===lm.getMonth()&&d.getFullYear()===lm.getFullYear(); });

  // Per mechanic stats
  const byMechanic = {};
  MECHANICS.forEach(m => { byMechanic[m] = recs.filter(r => r.mechanic===m).length; });

  // Problem rate
  const totalItems = recs.reduce((sum,r) => sum + (CHECKLISTS[r.type]?.items?.length||0), 0);
  const totalProblems = recs.reduce((sum,r) => sum + Object.values(r.items||{}).filter(v=>v==="problema").length, 0);
  const problemRate = totalItems > 0 ? ((totalProblems/totalItems)*100).toFixed(1) : 0;

  // Monthly data (last 6 months)
  const months = [];
  for (let i=5; i>=0; i--) {
    const d = new Date(now.getFullYear(), now.getMonth()-i, 1);
    const label = d.toLocaleDateString("pt-BR",{month:"short",year:"2-digit"}).replace(" de ","/"  );
    const count = recs.filter(r => { const rd=new Date(r.date); return rd.getMonth()===d.getMonth()&&rd.getFullYear()===d.getFullYear(); }).length;
    months.push({label, count});
  }
  const maxCount = Math.max(...months.map(m=>m.count), 1);

  // Items breakdown for this type
  const typeItems = CHECKLISTS[tab]?.items || [];
  const itemOkRate = {};
  typeItems.forEach(item => {
    const total = recs.filter(r => r.items?.[item.id]).length;
    const ok = recs.filter(r => r.items?.[item.id]==="ok").length;
    itemOkRate[item.id] = { label: item.label, ok, total, prob: recs.filter(r=>r.items?.[item.id]==="problema").length };
  });

  // Most common problems
  const problemItems = {};
  recs.forEach(r => {
    (CHECKLISTS[r.type]?.items||[]).forEach(item => {
      if (r.items?.[item.id]==="problema") {
        problemItems[item.label] = (problemItems[item.label]||0)+1;
      }
    });
  });
  const topProblems = Object.entries(problemItems).sort((a,b)=>b[1]-a[1]).slice(0,5);

  // Chamados stats
  const totalChamados = chamados.length;
  const chamadosAbertos = chamados.filter(c=>c.status==="aberto").length;
  const chamadosResolvidos = chamados.filter(c=>c.status==="resolvido").length;

  let html = "";

  // ── SECTION: Resumo do mês ──
  html += '<p style="font-size:11px;text-transform:uppercase;letter-spacing:0.06em;color:var(--text3);margin-bottom:8px;">Resumo do mês atual</p>';
  html += '<div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:1.5rem;">';
  html += kpi("📋", thisMonth.length, "Checklists", "var(--info-bg)", "var(--info)");
  html += kpi("📅", lastMonth.length, "Mês anterior", "var(--bg2)", "var(--text2)");
  html += kpi("⚠️", totalProblems, "Itens c/ problema", "var(--warning-bg)", "var(--warning)");
  html += kpi("📊", problemRate+"%", "Taxa de problemas", "var(--danger-bg)", "var(--danger)");
  html += '</div>';

  // ── SECTION: Por técnico ──
  html += '<p style="font-size:11px;text-transform:uppercase;letter-spacing:0.06em;color:var(--text3);margin-bottom:8px;">Checklists por técnico (total)</p>';
  html += '<div style="background:var(--bg2);border-radius:var(--radius-lg);padding:14px;margin-bottom:1.5rem;">';
  const maxMec = Math.max(...Object.values(byMechanic), 1);
  MECHANICS.forEach(m => {
    const count = byMechanic[m]||0;
    const pct = Math.round((count/maxMec)*100);
    html += '<div style="margin-bottom:12px;">';
    html += '<div style="display:flex;justify-content:space-between;margin-bottom:4px;">';
    html += '<span style="font-size:13px;font-weight:500;">'+m+'</span>';
    html += '<span style="font-size:13px;color:var(--text2);">'+count+' checklist'+(count!==1?'s':'')+'</span>';
    html += '</div>';
    html += '<div style="height:8px;background:var(--bg3,var(--bg));border-radius:4px;overflow:hidden;">';
    html += '<div style="height:8px;width:'+pct+'%;background:var(--info);border-radius:4px;transition:width 0.3s;"></div>';
    html += '</div></div>';
  });
  html += '</div>';

  // ── SECTION: Últimos 6 meses ──
  html += '<p style="font-size:11px;text-transform:uppercase;letter-spacing:0.06em;color:var(--text3);margin-bottom:8px;">Checklists — últimos 6 meses</p>';
  html += '<div style="background:var(--bg2);border-radius:var(--radius-lg);padding:14px;margin-bottom:1.5rem;">';
  html += '<div style="display:flex;align-items:flex-end;gap:6px;height:100px;">';
  months.forEach(m => {
    const h = maxCount > 0 ? Math.max(Math.round((m.count/maxCount)*80), m.count>0?8:2) : 2;
    html += '<div style="flex:1;display:flex;flex-direction:column;align-items:center;gap:4px;">';
    html += '<span style="font-size:10px;color:var(--text3);">'+(m.count>0?m.count:'')+'</span>';
    html += '<div style="width:100%;height:'+h+'px;background:'+(m.count>0?'var(--info)':'var(--bg3,var(--border))')+';border-radius:4px 4px 0 0;"></div>';
    html += '<span style="font-size:9px;color:var(--text3);text-align:center;">'+m.label+'</span>';
    html += '</div>';
  });
  html += '</div></div>';

  // ── SECTION: Taxa de aprovação por item ──
  if (recs.length > 0) {
    html += '<p style="font-size:11px;text-transform:uppercase;letter-spacing:0.06em;color:var(--text3);margin-bottom:8px;">Taxa de aprovação por item</p>';
    html += '<div style="background:var(--bg2);border-radius:var(--radius-lg);padding:14px;margin-bottom:1.5rem;">';
    typeItems.slice(0, 8).forEach(item => {
      const d = itemOkRate[item.id] || { ok:0, total:0, prob:0 };
      const pct = d.total > 0 ? Math.round((d.ok/d.total)*100) : 0;
      const barColor = pct >= 80 ? 'var(--success)' : pct >= 50 ? 'var(--warning)' : 'var(--danger)';
      html += '<div style="margin-bottom:10px;">';
      html += '<div style="display:flex;justify-content:space-between;margin-bottom:3px;">';
      html += '<span style="font-size:12px;">'+item.label+'</span>';
      html += '<span style="font-size:12px;font-weight:600;color:'+barColor+';">'+pct+'%</span>';
      html += '</div>';
      html += '<div style="height:6px;background:var(--bg);border-radius:3px;">';
      html += '<div style="height:6px;width:'+pct+'%;background:'+barColor+';border-radius:3px;"></div>';
      html += '</div></div>';
    });
    html += '</div>';
  }

  // ── SECTION: Problemas mais frequentes ──
  if (topProblems.length > 0) {
    html += '<p style="font-size:11px;text-transform:uppercase;letter-spacing:0.06em;color:var(--text3);margin-bottom:8px;">Itens com mais problemas</p>';
    html += '<div style="background:var(--bg2);border-radius:var(--radius-lg);padding:14px;margin-bottom:1.5rem;">';
    topProblems.forEach(([label, count], i) => {
      html += '<div style="display:flex;align-items:center;gap:10px;padding:6px 0;border-bottom:0.5px solid var(--border);">';
      html += '<span style="font-size:12px;font-weight:700;color:var(--text3);min-width:18px;">'+(i+1)+'</span>';
      html += '<span style="flex:1;font-size:13px;">'+label+'</span>';
      html += '<span class="pill" style="background:var(--danger-bg);color:var(--danger);">'+count+'×</span>';
      html += '</div>';
    });
    html += '</div>';
  }

  // ── SECTION: Chamados ──
  html += '<p style="font-size:11px;text-transform:uppercase;letter-spacing:0.06em;color:var(--text3);margin-bottom:8px;">Chamados — Histórico de Problemas</p>';
  html += '<div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:1.5rem;">';
  html += '<div style="background:var(--bg2);border-radius:var(--radius);padding:10px;text-align:center;"><p style="font-size:20px;font-weight:700;">'+totalChamados+'</p><p style="font-size:10px;color:var(--text3);margin-top:2px;">Total</p></div>';
  html += '<div style="background:var(--danger-bg);border-radius:var(--radius);padding:10px;text-align:center;"><p style="font-size:20px;font-weight:700;color:var(--danger);">'+chamadosAbertos+'</p><p style="font-size:10px;color:var(--danger);margin-top:2px;">Abertos</p></div>';
  html += '<div style="background:var(--success-bg);border-radius:var(--radius);padding:10px;text-align:center;"><p style="font-size:20px;font-weight:700;color:var(--success);">'+chamadosResolvidos+'</p><p style="font-size:10px;color:var(--success);margin-top:2px;">Resolvidos</p></div>';
  html += '</div>';

  html += '<p style="font-size:11px;color:var(--text3);text-align:center;padding-bottom:2rem;">Dados atualizados em tempo real</p>';

  w.insertAdjacentHTML("beforeend", html);
}

function kpi(icon, value, label, bg, color) {
  return '<div style="background:'+bg+';border-radius:var(--radius-lg);padding:14px;">' +
    '<p style="font-size:22px;margin-bottom:2px;">'+icon+'</p>' +
    '<p style="font-size:24px;font-weight:700;color:'+color+';">'+value+'</p>' +
    '<p style="font-size:12px;color:var(--text2);margin-top:2px;">'+label+'</p>' +
    '</div>';
}

function openLightbox(src, caption) {
  const lb = document.getElementById("lightbox");
  const img = document.getElementById("lightbox-img");
  const cap = document.getElementById("lightbox-caption");
  img.src = src;
  cap.textContent = caption || "";
  lb.classList.add("open");
  document.body.style.overflow = "hidden";
}

function closeLightbox() {
  document.getElementById("lightbox").classList.remove("open");
  document.getElementById("lightbox-img").src = "";
  document.body.style.overflow = "";
}

document.addEventListener("DOMContentLoaded", () => {
  document.getElementById("lightbox-close").onclick = closeLightbox;
  document.getElementById("lightbox").onclick = e => {
    if (e.target === document.getElementById("lightbox")) closeLightbox();
  };
  document.addEventListener("keydown", e => { if (e.key === "Escape") closeLightbox(); });
});

window.onload = () => {
  if (isAuthenticated()) {
    initFirebase();
  } else {
    showLogin();
  }
};
